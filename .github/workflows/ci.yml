name: Enterprise RAG CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run Black Code Formatter Check
        run: black --check backend/app frontend/app.py tests/ --exclude venv/

      - name: Lint with Flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv
          # exit-zero treats all errors as warnings.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv

  testing:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Check out Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov fastapi httpx streamlit langchain langchain-community langchain-chroma langchain-ollama pypdf sentence-transformers chromadb

      - name: Run Pytest Test Suite
        run: |
          pytest tests/ --cov=backend/app --cov-report=xml

  docker-build:
    runs-on: ubuntu-latest
    needs: testing
    steps:
      - name: Check out Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Image (Dry-Run)
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: jaiminpanchal/production-rag-backend:latest

      - name: Build Frontend Image (Dry-Run)
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: jaiminpanchal/production-rag-frontend:latest
